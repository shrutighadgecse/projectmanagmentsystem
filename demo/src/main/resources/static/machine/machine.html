<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Form</title>
    <link rel="stylesheet" href="../machine/machine.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 24px;">
                <div>
                    <label style="font-size:0.75em; color:#1976d2; font-weight:400; margin-bottom:2px;"></label>
                    <span id="timestamp" name="timestamp" style="font-size:0.75em; color:#333; margin-left:4px;"></span>
                </div>
                <span class="title">Machine Form</span>
            </div>
        </header>
        <div class="progress-container" style="margin-bottom: 20px;">
            <div class="progress-bar">
                <div class="step active" onclick="showPage('page1')">Purchase Order</div>
                <div class="step" onclick="showPage('page2')">Project Kick-Off</div>
                <div class="step" onclick="showPage('page3')">Assembly Operations</div>
                <div class="step" onclick="showPage('page4')">Assy Actuals</div>
                <div class="step" onclick="showPage('page5')">Review</div>
                <div class="step" onclick="showPage('page6')">Dispatch Details</div>
            </div>
            <div class="progress-line"></div>
        </div>
        <div class="machine-header-card">
            <div>
                <label>CCN</label>
                <div><input type="text" name="ccn" readonly></div>
            </div>
            <div>
                <label>Machine Name</label>
                <div><input type="text" name="machineName" readonly></div>
            </div>
            <div>
                <label>Model</label>
                <div><input type="text" name="model" readonly></div>
            </div>
            <div>
                <label>Customer Name</label>
                <div><input type="text" name="customerName" readonly></div>
            </div>
        </div>
        <div class="form-container">
            <div class="form-grid" style="margin-bottom: 20px; grid-template-columns: repeat(4, 1fr); display:none;">
                <div class="form-group" style="min-width:0;">
                    <label style="font-size:0.95em;">CCN:</label>
                    <input type="text" name="ccn" style="font-size:0.95em; padding:6px;" />
                </div>
                <div class="form-group" style="min-width:0;">
                    <label style="font-size:0.95em;">Machine Name:</label>
                    <input type="text" name="machineName" style="font-size:0.95em; padding:6px;" />
                </div>
                <div class="form-group" style="min-width:0;">
                    <label style="font-size:0.95em;">Model:</label>
                    <input type="text" name="model" style="font-size:0.95em; padding:6px;" />
                </div>
                <div class="form-group" style="min-width:0;">
                    <label style="font-size:0.95em;">Customer Name:</label>
                    <input type="text" name="customerName" style="font-size:0.95em; padding:6px;" />
                </div>
            </div>
            <!-- Page 1 -->
            <div id="page1" class="page">
                <h2>Purchase Order</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group"><label>Record No:</label><input type="text" name="recordNo"></div>
                    <div class="form-group"><label>PO Ref No:</label><input type="text" name="poRefNo"></div>
                    <div class="form-group"><label>PO Date:</label><input type="date" name="poDate"></div>
                    <div class="form-group"><label>PO Delivery Date:</label><input type="date" name="poDeliveryDate"></div>
                    <div class="form-group"><label>PO Value-Lacs:</label><input type="number" name="poValueLacs" ></div>
                    <div class="form-group"><label>Sales Person:</label><input type="text" name="salesPerson"></div>
                    <div class="form-group"><label>Order Type:</label><input type="text" name="orderType"></div>
                    <div class="form-group"><label>Address:</label><input type="text" name="address"></div>
                </form>
            </div>
            <!-- Page 2 -->
            <div id="page2" class="page" style="display:none;">
                <h2>The Project Kick-Off Review</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group"><label>Venue</label><input type="text" name="venue" required /></div>
                    <div class="form-group"><label>Unit</label><input type="text" name="unit" /></div>
                    <div class="form-group"><label>KOM No.</label><input type="text" name="komNo" placeholder="IMA-PG Indore/2024/022" required /></div>
                    <div class="form-group"><label>Members Present</label><input type="text" name="membersPresent" /></div>
                    <div class="form-group"><label>Machine CP Qty:</label><input type="number" name="machineCpQty" ></div>
                    <div class="form-group"><label>Machine Optional CP Qty:</label><input type="number" name="machineOptionalCpQty"></div>
                    <!-- Modified: add id to this input for stable selection -->
                    <div class="form-group"><label>Machine Family:</label><input type="text" id="machineFamily" name="machineFamily" ></div>
                    <div class="form-group"><label for="po_receipt_date">PO Receipt Date:</label><input type="date" id="po_receipt_date" name="po_receipt_date"></div>
                    <div class="form-group"><label for="oa_generation_date">OA Generation Date:</label><input type="date" id="oa_generation_date" name="oa_generation_date"></div>
                    <div class="form-group"><label for="kom_date">KOM Date:</label><input type="date" id="kom_date" name="kom_date"></div>
                    <div class="form-group"><label for="advance_payment_receipt_date">Advance Payment Receipt Date:</label><input type="date" id="advance_payment_receipt_date" name="advance_payment_receipt_date"></div>
                    <div class="form-group"><label for="balance_payment_receipt_date">Balance Payment Receipt Date:</label><input type="date" id="balance_payment_receipt_date" name="balance_payment_receipt_date"></div>
                    <div class="form-group"><label for="cp_layout_approvals">CP Layout Approvals:</label><input type="date" id="cp_layout_approvals" name="cp_layout_approvals"></div>
                    <div class="form-group"><label for="machine_layout_approvals">Machine Layout Approvals:</label><input type="date" id="machine_layout_approvals" name="machine_layout_approvals"></div>
                    <div class="form-group"><label for="room_layout_approvals">Room Layout Approvals:</label><input type="date" id="room_layout_approvals" name="room_layout_approvals"></div>
                    <div class="form-group"><label for="loa_basic">LOA Basic:</label><input type="date" id="loa_basic" name="loa_basic"></div>
                     <div class="form-group"><label for="loa_optional">LOA Optional:</label><input type="date" id="loa_optional" name="loa_optional"></div>
                    <div class="form-group"><label for="dq_release">DQ Release:</label><input type="date" id="dq_release" name="dq_release"></div>
                    <div class="form-group"><label for="ppc_basic_date">PPC Basic Date (As per Kickoff):</label><input type="date" id="ppc_basic_date" name="ppc_basic_date"></div>
                    <div class="form-group"><label for="ppc_optional_date">PPC Optional Date (As per Kickoff):</label><input type="date" id="ppc_optional_date" name="ppc_optional_date"></div>
                    <div class="form-group"><label for="cp_design_release_date">CP Design Release Date:</label><input type="date" id="cp_design_release_date" name="cp_design_release_date"></div>
                    <div class="form-group"><label for="machine_manufacturing_basic">Machine Manufacturing Basic:</label><input type="date" id="machine_manufacturing_basic" name="machine_manufacturing_basic"></div>
                    <div class="form-group"><label for="machine_manufacturing_customisation">Machine Manufacturing Customisation:</label><input type="date" id="machine_manufacturing_customisation" name="machine_manufacturing_customisation"></div>
                    <div class="form-group"><label for="cp_manufacturing_date">CP Manufacturing Date:</label><input type="date" id="cp_manufacturing_date" name="cp_manufacturing_date"></div>
                    <div class="form-group"><label for="pmr_genration_submission_date">PMR Generation & Submission to Customer Date:</label><input type="date" id="pmr_genration_submission_date" name="pmr_genration_submission_date"></div>
                    <div class="form-group"><label for="products_receipt_date">Product Receipt Date:</label><input type="date" id="products_receipt_date" name="products_receipt_date"></div>
                    <div class="form-group"><label for="packaging_receipt_date">Packaging Receipt Date:</label><input type="date" id="packaging_receipt_date" name="packaging_receipt_date"></div>
                    <div class="form-group"><label for="ifat_protocol_release">IFAT Protocols Release:</label><input type="date" id="ifat_protocol_release" name="ifat_protocol_release"></div>
                    <div class="form-group"><label for="ifat_std_cp">IFAT With Std CP (As per Kickoff):</label><input type="date" id="ifat_std_cp" name="ifat_std_cp"></div>
                    <div class="form-group"><label for="ifat_customer_cp">IFAT With Customer CP (As per Kickoff):</label><input type="date" id="ifat_customer_cp" name="ifat_customer_cp"></div>
                    <div class="form-group"><label for="cfat">CFAT (As per Kickoff):</label><input type="date" id="cfat" name="cfat"></div>
                    <div class="form-group"><label for="compliance">Compliance:</label><input type="date" id="compliance" name="compliance"></div>
                    <div class="form-group"><label for="dispatch_clearance">Dispatch Clearance:</label><input type="date" id="dispatch_clearance" name="dispatch_clearance"></div>
                    <div class="form-group"><label for="planned_dispatch_date">Planned Dispatch Date (As per Kickoff):</label><input type="date" id="planned_dispatch_date" name="planned_dispatch_date"></div>
                    
                    
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <label for="machine_basics">Machine Basics:</label>
                        <textarea id="machine_basics" name="machineBasics" style="width:99%; min-width:400px; height:60px;"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <label for="machine_features">Machine Features:</label>
                        <textarea id="machine_features" name="machineFeatures" style="width:99%; min-width:400px; height:60px;"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <label for="additional_options">Additional Options:</label>
                        <textarea id="additional_options" name="additionalOptions" style="width:99%; min-width:400px; height:60px;"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <label for="project_kickoff_details">Project Kick-off Details:</label>
                        <textarea id="project_kickoff_details" name="projectKickoffDetails"></textarea>
                    </div>
                </form>
            </div>
            <!-- Page 3 -->
            <div id="page3" class="page" style="display:none;">
                <h2>Assembly Operations</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group"><label>CCN Status:</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="radio" name="ccnStatus" id="live" value="Live" checked><label for="live">Live</label>
                            <input type="radio" name="ccnStatus" id="closed" value="Closed"><label for="closed">Closed</label>
                        </div>
                    </div>
                    <div class="form-group"><label for="machine-category">Machine Category:</label>
                        <input type="text" id="machine-category" name="machineCategory" />
                    </div>
                    <div class="form-group"><label>Workmen:</label><input type="text" name="workmen"></div>
                    <div class="form-group"><label>Std Task Of Machine:</label><input type="text" name="stdTaskOfMachine"></div>
                    <div class="form-group"><label>Task Completed:</label><input type="number" name="taskCompleted" ></div>
                    <div class="form-group"><label>Machine Percentage:</label><input type="text" name="machinePercentage" readonly ></div>
                    <div class="form-group"><label for="live-status">Live Status:</label>
                        <select id="live-status" name="liveStatus" >
                            <option value="NEW CCN FOR APPROVAL">NEW CCN FOR APPROVAL</option>
                            <option value="DESIGN">DESIGN</option>
                            <option value="IN MUMBAI">IN MUMBAI</option>
                            <option value="RECEIVED FROM MUMBAI">RECEIVED FROM MUMBAI</option>
                            <option value="PPC" selected>PPC</option>
                            <option value="WIP- KANBAN">WIP- KANBAN</option>
                            <option value="WIP -BASIC">WIP -BASIC</option>
                            <option value="WIP- OPTIONALS">WIP- OPTIONALS</option>
                            <option value="HOLD - AUTOMATION PENDING">HOLD - AUTOMATION PENDING</option>
                            <option value="HOLD">HOLD</option>
                            <option value="STD CP TRIALS">STD CP TRIALS</option>
                            <option value="IFAT IN PROGRESS">IFAT IN PROGRESS</option>
                            <option value="IFAT DONE">IFAT DONE</option>
                            <option value="POST IFAT - POINT CLOSURE">POST IFAT - POINT CLOSURE</option>
                            <option value="READY">READY</option>
                            <option value="AWAITED PRODUCT">AWAITED PRODUCT</option>
                            <option value="AWAITED PACKAGING">AWAITED PACKAGING</option>
                            <option value="AWAITED CP">AWAITED CP</option>
                            <option value="CUSTOMER CP TRIALS">CUSTOMER CP TRIALS</option>
                            <option value="AWAITED CFAT">AWAITED CFAT</option>
                            <option value="CFAT IN PROGRESS">CFAT IN PROGRESS</option>
                            <option value="CFAT DONE">CFAT DONE</option>
                            <option value="RE-CFAT ">RE-CFAT</option>
                            <option value="POST CFAT - POINT CLOSURE">POST CFAT - POINT CLOSURE</option>
                             <option value="COMPLIANCE - SENT TO CUSTOMER">COMPLIANCE - SENT TO CUSTOMER</option>
                            <option value="AWAITING PACKING CLEARLANCE">AWAITING PACKING CLEARLANCE</option>
                            <option value="FOR DISPATCH">FOR DISPATCH</option>
                            <option value="AWAITING COMMERCIAL CLEARLANCE">AWAITING COMMERCIAL CLEARLANCE</option>
                            <option value="STOCK MC - READY">STOCK MC - READY</option>


                        </select>
                    </div>
                    <div class="form-group"><label>Project Percentage:</label>
                        <input type="text" name="projectPercentage" id="projectPercentage" readonly >
                    </div>
                    <div class="form-group"><label>Last Updated Data As On:</label><input type="date" name="lastUpdatedData"></div>
                    <!-- Move these 4 fields up in a single row -->
                 
                 
                    <div class="form-group"><label>100% Self Pulling Material From Store:</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="radio" name="selfPullingMaterial" id="self_yes" value="Yes"><label for="self_yes">Yes</label>
                            <input type="radio" name="selfPullingMaterial" id="self_no" value="No"><label for="self_no">No</label>
                        </div>
                    </div>
                    <div class="form-group"><label for="cpInterchangesDropdown">CP Interchanged:</label>
                        <select id="cpInterchangesDropdown" name="cpInterchanged" >
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>

                    <!-- NEW: CP Trial On Machine dropdown (Yes/No) -->
                    <div class="form-group">
                        <label for="cp-trial-on-machine">CP Trial On Machine:</label>
                        <select id="cp-trial-on-machine" name="cpTrialOnMachine" >
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>

                    <!-- NEW: CP Trial remark - hidden by default; will be shown when dropdown is Yes -->
                    <div id="cp-trial-remark-row" class="form-group" style="grid-column: 1 / span 4; display:none;">
                        <label for="cp-trial-on-machine-remark">CP Trial On Machine Remark:</label>
                        <textarea id="cp-trial-on-machine-remark" name="cpTrialOnMachineRemark" ></textarea>
                    </div>
                  
                  
                    <!-- Move all textareas below and increase their width -->
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Pending/ Follow Up(MECH):</label><textarea name="shortDetailMech" style="width:99%; min-width:800px; height:60px;"></textarea></div>
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Pending/ Follow Up (ELECTRICAL):</label><textarea name="shortDetailElectrical" style="width:99%; min-width:800px; height:60px;"></textarea></div>
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Pending/ Follow Up (CP):</label><textarea name="shortDetailCp" style="width:99%; min-width:800px; height:60px;"></textarea></div>
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Progress Status:</label><textarea name="remarks" style="width:99%; min-width:800px; height:60px;"></textarea></div>
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Delay Analysis:</label><textarea name="delayAnalysis" style="width:99%; min-width:800px; height:60px;"></textarea></div>
                    <!-- Move upload field to just above the buttons -->
                    <div class="form-group" style="grid-column: 1 / span 4;"><label for="image">Upload Machine Latest Image:</label>
                        <input type="file" id="image" name="image" accept="image/*">
                    </div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <button type="button" class="btn save" onclick="savePage('page3')">Save</button>
                        <button type="button" class="btn discard" onclick="discardChanges()">Discard</button>
                    </div>
                </form>
            </div>
            <!-- Page 4 -->
            <div id="page4" class="page" style="display:none;">
                <h2>Assy Actuals</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group"><label>Actual Material Receipt Date:</label><input type="date" name="actualMaterialReceiptDate"></div>
                    <div class="form-group"><label>Actual / Dynamic Manf Plan:</label><input type="date" name="actualDynamicManufacturingPlan"></div>
                    <div class="form-group"><label>Actual / Dynamic Dispatch Plan:</label><input type="date" name="actualDynamicDispatchPlan"></div>
                    <div class="form-group"><label>Actual Assy Start Date:</label><input type="date" name="actualAssyStartDate"></div>
                    <div class="form-group"><label>Actual IFAT Date:</label><input type="date" name="actualIfatDate"></div>
                    <div class="form-group"><label>Actual CP Date:</label><input type="date" name="actualCpDate"></div>
                    <div class="form-group"><label>Actual CFAT Date:</label><input type="date" name="actualCfatDate"></div>
                    <div class="form-group"><label>Compliance Closure Date:</label><input type="date" name="complianceClosureDate"></div>
                    <div class="form-group"><label>MECH Non Issuance:</label><input type="text" name="mechNonIssuance"></div>
                    <div class="form-group"><label>ELECT Non Issuance:</label><input type="number" name="electNonIssuance" style="height:38px; min-width:0; width:100%; max-width:250px; font-size:1em; padding:8px;"></div>
                    <div class="form-group"><label>Handed To Dispatch Dept:</label><input type="date" name="handedToDispatchDept"></div>
                    <div class="form-group" style="grid-column: 1 / span 4;">

                </form>
            </div>
            <!-- Page 5 -->
            <div id="page5" class="page" style="display:none;">
                <h2>Review</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group" style="grid-column: 1 / span 4;"><label>Weekly Review:</label><textarea name="weeklyReview"></textarea></div>
                    <div class="form-group"><label>Re-Scheduled IFAT Date(As per Weekly meeting):</label><input type="date" name="rescheduledIfatDate"></div>
                    <div class="form-group"><label>Re-Scheduled CFAT Date (As per Weekly meeting):</label><input type="date" name="rescheduledCfatDate"></div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <button type="button" class="btn save" onclick="savePage('page5')">Save</button>

            </div>
            <!-- Page 6 -->
            <div id="page6" class="page" style="display:none;">
                <h2>Dispatch Details</h2>
                <form class="form-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="form-group"><label>Dispatched Month:</label><input type="text" name="dispatched_month"></div>
                    <div class="form-group"><label>Invoice Date:</label><input type="date" name="invoiceDate"></div>
                    <div class="form-group" style="grid-column: 1 / span 4;">
                        <button type="button" class="btn save" onclick="savePage('page6')">Save</button>

              </form>
            </div>

    <!-- Modal: Add after form area, before scripts -->
    <style>
    /* modal simple styles */
    #save-success-modal { display:none; position:fixed; left:0; top:0; right:0; bottom:0; background: rgba(0,0,0,0.4); align-items:center; justify-content:center; z-index:9999; }
    #save-success-modal .modal-card { background:#fff; padding:20px; border-radius:8px; width:90%; max-width:520px; box-shadow:0 6px 20px rgba(0,0,0,0.2); }
    #save-success-modal .modal-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:18px; }
    .btn.primary { background:#1976d2; color:#fff; border:none; padding:8px 14px; border-radius:4px; cursor:pointer; }
    .btn.secondary { background:#f5f5f5; color:#333; border:1px solid #ddd; padding:8px 14px; border-radius:4px; cursor:pointer; }
    </style>

    <div id="save-success-modal" role="dialog" aria-modal="true" aria-labelledby="saveSuccessTitle">
      <div class="modal-card">
        <h3 id="saveSuccessTitle">Saved successfully</h3>
        <p id="saveSuccessText">The form was saved successfully.</p>
        <div class="modal-actions">
          <button id="generateReportBtn" class="btn primary">Generate Report</button>
          <button id="closeModalBtn" class="btn secondary">Close</button>
        </div>
      </div>
    </div>

    <script src="machine.js"></script>
    <script>
    // On page load, fetch data by CCN and fill form fields.
    document.addEventListener('DOMContentLoaded', async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const ccn = urlParams.get('ccn');

    
      try {
        const anyChecked = document.querySelector('input[name="selfPullingMaterial"]:checked');
        if (!anyChecked) {
          const noRadio = document.querySelector('input[name="selfPullingMaterial"][value="No"]');
          if (noRadio) noRadio.checked = true;
        }
      } catch (e) { /* ignore */ }

      // --- NEW: ensure CP Trial dropdown defaults to "No" immediately on load if nothing selected ---
      try {
        const cpTrialSelect = document.querySelector('select[name="cpTrialOnMachine"]');
        if (cpTrialSelect && !cpTrialSelect.value) cpTrialSelect.value = 'No';
      } catch (e) { /* ignore */ }

      // If no CCN present we still continue (but DO NOT use localStorage; leave timestamp blank)
      try {
        if (!ccn) {
          // No CCN: do not generate or persist any timestamp on client
          const el = document.getElementById('timestamp');
          if (el) el.textContent = ''; // show blank until server provides a timestamp
          return;
        }
      } catch (e) { /* ignore */ }
      if (!ccn) return;
      try {
        const res = await fetch(`/api/machine/by-ccn?ccn=${encodeURIComponent(ccn)}`);
        if (res.ok) {
          const data = await res.json();
          // Helper to set value if exists
          function setValue(selector, value) {
            if (value !== undefined && value !== null) {
              const el = document.querySelector(selector);
              if (el) el.value = value;
            }
          }

          // Timestamp handling: use only server-provided timestamp (if present)
          try {
            const el = document.getElementById('timestamp');
            // If server returned a saved machine with a timestamp, use it.
            if (data && data.machine && data.machine.timestamp) {
              if (el) el.textContent = data.machine.timestamp;
            } else if (data && data.machine && !data.machine.timestamp) {
              // Saved machine exists but no timestamp (edge): leave blank so server controls it.
              if (el) el.textContent = '';
            } else {
              // No machine in DB for this CCN -> generate a one-time timestamp for initial creation.
              const now = new Date();
              const yyyy = now.getFullYear();
              const mm = String(now.getMonth() + 1).padStart(2, '0');
              const dd = String(now.getDate()).padStart(2, '0');
              const hh = String(now.getHours()).padStart(2, '0');
              const min = String(now.getMinutes()).padStart(2, '0');
              const ss = String(now.getSeconds()).padStart(2, '0');
              const generated = `${yyyy}-${mm}-${dd}T${hh}:${min}:${ss}`;
              if (el) el.textContent = generated;
            }
          } catch (e) { /* ignore timestamp display errors */ }

          function setAllValues(selector, value) {
            if (value !== undefined && value !== null) {
              document.querySelectorAll(selector).forEach(i => i.value = value);
            }
          }
          // Prefer machine for overlapping fields, else kickoff, else PO
          const machine = data.machine || {};
          const kickoff = data.kickoff || {};

    // Normalize keys: convert snake_case keys to camelCase so backend (Jackson -> Machine) maps properly
    function toCamelCase(s) {
      return s.replace(/_([a-z])/g, function (g) { return g[1].toUpperCase(); });
    }

    function getFormData() {
      const raw = {};
      // Collect all input, textarea, and select values from the entire page
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (!el.name) return; // skip unnamed
        if (el.type === 'radio') {
          if (el.checked) raw[el.name] = el.value;
        } else if (el.type === 'checkbox') {
          raw[el.name] = el.checked;
        } else if (el.type === 'file') {
          // ignore files for now (handled separately if needed)
        } else {
          raw[el.name] = el.value;
        }
      });

      // Add timestamp from span (this will be server-provided if present)
      raw['timestamp'] = document.getElementById('timestamp') ? document.getElementById('timestamp').textContent : '';
      // Add projectPercentage from input (if not already set)
      const projectPercentageInput2 = document.querySelector('input[name="projectPercentage"]');
      if (projectPercentageInput2) {
        raw['projectPercentage'] = projectPercentageInput2.value;
      }

      // Convert snake_case keys to camelCase so Jackson maps to Machine POJO
      const normalized = {};
      Object.keys(raw).forEach(k => {
        const camel = toCamelCase(k);
        // If the key was already camelCase, toCamelCase will not change it
        normalized[camel] = raw[k];
      });

      return normalized;
    }

    async function savePage(pageId) {
      const data = getFormData();

      // Ensure machineFamily is explicitly included (robustness in case of DOM/name issues)
      const mf = (document.querySelector('input[name="machineFamily"]') || document.getElementById('machineFamily'));
      if (mf) data.machineFamily = mf.value;

      // Compute fallback redirect URL (same logic as previous behavior) but do not auto-redirect here
      const urlParams = new URLSearchParams(window.location.search);
      let from = urlParams.get('from');
      if (!from) {
        const ref = (document.referrer || '').toLowerCase();
        if (ref.includes('machines-by-status')) from = 'machines-by-status';
        else if (ref.includes('kickoff-list')) from = 'kickoff-list';
      }

      let fallbackUrl = '/kickoff-list.html';
      if (from === 'machines-by-status') {
        const dest = new URLSearchParams();
        const status = urlParams.get('status'); if (status) dest.set('status', status);
        const unit = urlParams.get('unit'); if (unit) dest.set('unit', unit);
        const month = urlParams.get('month'); if (month) dest.set('month', month);
        const year = urlParams.get('year'); if (year) dest.set('year', year);
        const q = dest.toString();
        fallbackUrl = `/machine/machines-by-status.html${q ? ('?' + q) : ''}`;
      } else if (from === 'kickoff-list') {
        fallbackUrl = '/kickoff-list.html';
      } else {
        // Default / legacy behavior: if invoiceDate + ccn exists, prepare report link; otherwise kickoff list
        const invoiceDate = (data.invoiceDate || '').toString().trim();
        const ccnVal = (data.ccn || '').toString().trim();
        if (invoiceDate && ccnVal) {
          // fallback will open report page when "Close" is pressed, but prefer to let user choose from modal.
          fallbackUrl = `/machine/machine-report.html?ccn=${encodeURIComponent(ccnVal)}`;
        } else {
          fallbackUrl = '/kickoff-list.html';
        }
      }

      try {
        const res = await fetch('/api/machine/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          // Instead of immediately redirecting, show modal with Generate Report option.
          const ccnForReport = (data.ccn || '').toString().trim();
          const modal = document.getElementById('save-success-modal');
          const generateBtn = document.getElementById('generateReportBtn');
          const closeBtn = document.getElementById('closeModalBtn');
          const msg = document.getElementById('saveSuccessText');
          if (msg) {
            if (ccnForReport) msg.textContent = `The form for CCN ${ccnForReport} was saved successfully. You can generate a report for this CCN.`;
            else msg.textContent = 'The form was saved successfully.';
          }
          // Generate report opens new tab/window with report page
          if (generateBtn) {
            generateBtn.onclick = function() {
              if (ccnForReport) {
                window.open(`/machine/machine-report.html?ccn=${encodeURIComponent(ccnForReport)}`, '_blank');
              } else {
                // if no CCN, open report page without ccn (report page will show an error/notice)
                window.open(`/machine/machine-report.html`, '_blank');
              }
              // keep modal open so user can close or generate again; optionally close it:
              if (modal) modal.style.display = 'none';
            };
          }
          // Close navigates to fallbackUrl (preserves previous flows)
          if (closeBtn) {
            closeBtn.onclick = function() {
              if (modal) modal.style.display = 'none';
              window.location.href = fallbackUrl;
            };
          }
          if (modal) modal.style.display = 'flex';
          return;
        } else {
          alert('Save failed!');
        }
      } catch (err) {
        alert('Save failed!');
      }
    }

      // show requested page
      const page = document.getElementById(pageId);
      if (page) page.style.display = 'block';
      // update step active state
      document.querySelectorAll('.step').forEach(step => {
        step.classList.toggle('active', step.getAttribute('onclick') && step.getAttribute('onclick').includes(pageId));
      });
      // update progress line
      const steps = document.querySelectorAll('.step');
      const activeIndex = Array.from(steps).findIndex(step => step.classList.contains('active'));
      const progress = ((activeIndex + 1) / steps.length) * 100;
      document.querySelector('.progress-line').style.setProperty('--progress', progress + '%');
      // scroll active step into view (for small screens)
      const active = document.querySelector('.step.active');
      if (active && active.scrollIntoView) active.scrollIntoView({inline:'center', behavior:'smooth'});
    }

        }

        // track previous selection
        let prevCcnStatus = (document.querySelector('input[name="ccnStatus"]:checked') || {}).value || 'Live';

        function revertToPrevious() {
          document.querySelectorAll('input[name="ccnStatus"]').forEach(r => {
            r.checked = (r.value.toLowerCase() === (prevCcnStatus || '').toLowerCase());
          });
        }

        function setCcnStatusTo(value) {
          document.querySelectorAll('input[name="ccnStatus"]').forEach(r => {
            if (r.value.toLowerCase() === value.toLowerCase()) r.checked = true;
            else r.checked = false;
          });
          prevCcnStatus = value;
        }

        const invoiceInput = document.querySelector('input[name="invoiceDate"]');

        document.querySelectorAll('input[name="ccnStatus"]').forEach(radio => {
          radio.addEventListener('change', function(e) {
            const newVal = (this.value || '').toLowerCase();
            if (newVal === 'close' || newVal === 'closed') {
              if (!allMandatoryFieldsFilled()) {
                alert('Cannot mark CCN Closed. Please fill all Assy/Dispatch fields and Invoice Date first.');
                setTimeout(revertToPrevious, 0);
                return;
              }
            }
            // update previous only when change allowed
            prevCcnStatus = this.value;
          });
        });

        // Auto-close when invoiceDate is set AND all required fields are filled.
        if (invoiceInput) {
          invoiceInput.addEventListener('input', function() {
            const val = (this.value || '').trim();
            if (val) {
              if (allMandatoryFieldsFilled()) {
                setCcnStatusTo('Closed');
              } else {
                // if invoice entered but other required fields missing, do not close; inform user
                alert('Invoice entered but some required Assy/Dispatch fields are still empty. Fill them to auto-close CCN.');
                // keep previous or set Live
                if (!prevCcnStatus || /^closed?$/i.test(prevCcnStatus)) setCcnStatusTo('Live');
                else setCcnStatusTo(prevCcnStatus);
              }
            } else {
              // invoice cleared -> revert to previous (if not closed) or Live
              if (prevCcnStatus && !/^closed?$/i.test(prevCcnStatus)) setCcnStatusTo(prevCcnStatus);
              else setCcnStatusTo('Live');
            }
          });
        }

      } catch (e) { /* ignore */ }
    })();

    // Before sending to server, ensure we don't submit a Close without all mandatory fields (extra safety)
    (function(){
      const origSave = window.savePage;
      if (typeof origSave === 'function') {
        window.savePage = async function(pageId) {
          try {
            // check if CCN would be closed
            const checked = document.querySelector('input[name="ccnStatus"]:checked');
            const ccnStatusVal = checked ? checked.value.toLowerCase() : '';
            if ((ccnStatusVal === 'close' || ccnStatusVal === 'closed')) {
              // verify all required selectors are filled (same list as above)
              const requiredSelectors = [
                'input[name="actualMaterialReceiptDate"]',
                'input[name="actualDynamicManufacturingPlan"]',
                'input[name="actualDynamicDispatchPlan"]',
                'input[name="actualAssyStartDate"]',
                'input[name="actualIfatDate"]',
                'input[name="actualCpDate"]',
                'input[name="actualCfatDate"]',
                'input[name="complianceClosureDate"]',
                'input[name="mechNonIssuance"]',
                'input[name="electNonIssuance"]',
                'input[name="handedToDispatchDept"]',
                'input[name="invoiceDate"]'
              ];
              for (let sel of requiredSelectors) {
                const el = document.querySelector(sel);
                if (!el || !(el.value || '').toString().trim()) {
                  alert('Cannot save: all Assy/Dispatch fields and Invoice Date must be filled before closing CCN.');
                  return;
                }
              }
            }
          } catch (e) { /* ignore */ }
          return origSave(pageId);
        };
      }
    })();
    </script>
</body>
</html>
