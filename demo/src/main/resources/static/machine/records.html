<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Machine Records</title>
  <style>
    /* Header layout like PO page */
    .page-header {
      position: relative;
      display: flex;
      align-items: center;
      padding: 1rem 0.5rem;
      gap: 1rem;
    }
    .page-header h1 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      z-index: 1; /* ensure title is below the back link */
    }
    .page-header .filters {
      margin-left: auto;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      align-self: stretch;
      flex-wrap: wrap;
    }
    .page-header .filters label {
      font-weight: 600;
      margin-right: 0.35rem;
      font-size: 0.85rem;
      color: #2c3e50;
      display: inline-flex;
      align-items: center;
    }
    .page-header .filters select {
      padding: 0.25rem 0.6rem;
      font-size: 0.85rem;
      border-radius: 6px;
      border: 1px solid #cfd8dc;
      background: linear-gradient(180deg,#ffffff,#fbfdff);
      box-shadow: inset 0 1px 2px rgba(16,24,32,0.03);
      color: #133e47;
      min-width: 7.5rem;
      transition: border-color .12s ease, box-shadow .12s ease, transform .06s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .page-header .filters button {
      padding: 0.35rem 0.7rem;
      font-size: 0.9rem;
      border-radius: 6px;
      border: none;
      background: linear-gradient(180deg,#17879a,#0f5f6b);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(17,83,92,0.12);
      transition: transform .08s ease, box-shadow .12s ease, opacity .08s ease;
    }

    /* Table and report styles (matching PO output table) */
    body { font-family: 'Roboto Condensed', Arial, sans-serif; padding: 16px; background: #f6f8fb; }
    .responstable,
    .responstable th,
    .responstable td { font-family: 'Roboto Condensed', Arial, sans-serif; font-size: 12px; }
    .responstable { border-collapse: collapse; width: 100%; background: #fff; }
    .responstable thead th {
      background: #167F92;
      color: #fff;
      padding: 8px 10px;
      border: 1px solid #333;
      text-align: left;
      white-space: nowrap;
    }
    .responstable tbody td {
      padding: 8px 10px;
      border-top: 1px solid #ddd;
      border-left: none;
      border-right: none;
      border-bottom: none;
      vertical-align: top;
      white-space: normal;
      color: #23313a;
      font-size: 13px;
    }

    .table-wrapper {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      overflow-x: auto;
    }

    .back { margin-bottom: 0; display:inline-block; color:#0f5f6b; text-decoration:none; font-weight:600; padding:0.25rem 0.5rem; border-radius:6px; background:transparent; border:1px solid transparent; position: relative; z-index: 2; /* keep back link clickable */ }
    .back:hover { background: rgba(23,135,154,0.06); }

    /* report modal */
    #report-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.25);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #report-content {
      background: #fff;
      padding: 1.2em;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      position: relative;
    }

    /* Print-friendly rules similar to PO page */
    @page { size: A4 landscape; margin: 10mm; }
    @media print {
      html,body{height:auto;margin:0;padding:0;overflow:visible !important;}
      #report-modal, #report-content { position: static !important; max-height: none !important; overflow: visible !important; }
      .table-wrapper { overflow: visible !important; width: auto !important; margin-left: 0 !important; }
      table.responstable { width: auto !important; max-width: 100% !important; min-width: 0 !important; font-size:10px !important; table-layout:auto; border-collapse: collapse; }
      thead { display: table-header-group; }
      tr { page-break-inside: avoid; page-break-after: auto; }
      .responstable thead th, .responstable tbody td { white-space: normal; word-break: break-word; }
    }

    /* small-screen tweaks */
    @media (max-width:720px) {
      .page-header { padding: 0.6rem 0.6rem; }
      .page-header h1 { font-size: 1rem; }
      .page-header .filters label { display: none; }
      .page-header .filters select { min-width: 6rem; font-size: 0.8rem; }
      .page-header .filters button { padding: 0.3rem 0.6rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <a class="back" href="/machine/cardss.html">← Back to Dashboard</a>
    <h1 id="title">Records</h1>
  </div>

  <div id="countInfo" style="margin:8px 0 12px 0; color:#34495e; font-weight:600;"></div>

  <div class="table-wrapper">
    <table id="tbl" class="responstable">
      <thead>
        <tr>
          <th>CCN</th><th>Machine</th><th>Model</th><th>CCN Status</th><th>Timestamp</th><th>Assy Start</th><th>Invoice Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- report modal skeleton (hidden) -->
  <div id="report-modal" role="dialog" aria-hidden="true">
    <div id="report-content">
      <!-- ...report content would go here... -->
    </div>
  </div>

  <script>
    function getQueryParams() {
      const q = {};
      location.search.slice(1).split('&').forEach(pair => {
        if (!pair) return;
        const [k,v] = pair.split('=').map(decodeURIComponent);
        q[k] = v;
      });
      return q;
    }

    async function loadRecords() {
      const q = getQueryParams();
      const family = q.family || 'Unknown';
      const year = q.year || new Date().getFullYear();
      const op = q.op || 'all';
      document.getElementById('title').textContent = `${family} — ${op.toUpperCase()} (${year})`;
      const res = await fetch(`/api/machine/records?family=${encodeURIComponent(family)}&year=${encodeURIComponent(year)}&op=${encodeURIComponent(op)}`);
      if (!res.ok) {
        document.getElementById('countInfo').textContent = 'Unable to load records';
        return;
      }
      const list = await res.json();
      document.getElementById('countInfo').textContent = `Total: ${list.length}`;
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = '';
      list.forEach(m => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${m.ccn ?? ''}</td>
          <td>${m.machineName ?? ''}</td>
          <td>${m.model ?? ''}</td>
          <td>${m.ccnStatus ?? ''}</td>
          <td>${m.timestamp ?? ''}</td>
          <td>${m.actualAssyStartDate ?? ''}</td>
          <td>${m.invoiceDate ?? ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', loadRecords);
  </script>
</body>
</html>
