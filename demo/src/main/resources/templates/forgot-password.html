<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - IMA Project Management System</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Cache-Control" content="post-check=0, pre-check=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" th:href="@{/forgot-password.css}" />
    <script src="https://kit.fontawesome.com/41baba5a65.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-card">
            <div class="card-header">
                <h2><i class="fas fa-key"></i> Forgot Password</h2>
                <p>Step 1 of 3: Enter Your Email</p>
            </div>

            <div class="card-body">
                <!-- Error Message -->
                <div th:if="${error != null}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <form id="forgotPasswordForm" method="POST" action="" th:action="@{/forgot-password/request-otp}">
                    <div class="form-group">
                        <label for="emailid">Email Address</label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                id="emailid" 
                                name="emailid" 
                                class="form-control" 
                                placeholder="Enter your registered email" 
                                required
                                autocomplete="off"
                                onchange="validateEmail()"
                            />
                            <span id="emailStatus" class="input-status"></span>
                        </div>
                        <small id="emailHint" class="form-hint"></small>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                            <i class="fas fa-envelope"></i> Send OTP
                        </button>
                        <a href="/" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </form>

                <div class="help-text">
                    <p>
                        <i class="fas fa-info-circle"></i>
                        We'll send a one-time password (OTP) to your email address. Please check your inbox and spam folder.
                    </p>
                </div>
            </div>

            <div class="card-footer">
                <p>Having trouble? <a href="/contact">Contact Support</a></p>
            </div>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active">
                <div class="step-circle">1</div>
                <div class="step-label">Email</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-circle">2</div>
                <div class="step-label">OTP</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-circle">3</div>
                <div class="step-label">Reset</div>
            </div>
        </div>
    </div>

    <script>
        let emailValidationTimeout;

        function validateEmail() {
            const emailInput = document.getElementById('emailid');
            const emailStatus = document.getElementById('emailStatus');
            const emailHint = document.getElementById('emailHint');
            const submitBtn = document.getElementById('submitBtn');
            const email = emailInput.value.trim();

            emailStatus.innerHTML = '';
            emailHint.innerHTML = '';

            if (!email) {
                submitBtn.disabled = true;
                return;
            }

            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailStatus.innerHTML = '<i class="fas fa-times-circle"></i>';
                emailStatus.className = 'input-status error';
                emailHint.innerHTML = 'Please enter a valid email address';
                submitBtn.disabled = true;
                return;
            }

            // Check if email exists in system
            clearTimeout(emailValidationTimeout);
            emailStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            emailStatus.className = 'input-status loading';
            emailHint.innerHTML = 'Checking email...';

            emailValidationTimeout = setTimeout(() => {
                fetch('/api/checkEmail?email=' + encodeURIComponent(email))
                    .then(response => response.json())
                    .then(data => {
                        // Note: /api/checkEmail returns `available: false` when the email
            // is already registered (because it’s "available" for new
            // registration). For the forgot-password flow we want the
            // opposite meaning: existence = !available.
            if (!data.available) {
                            emailStatus.innerHTML = '<i class="fas fa-check-circle"></i>';
                            emailStatus.className = 'input-status success';
                            emailHint.innerHTML = 'Email found in system';
                            submitBtn.disabled = false;
                        } else {
                            emailStatus.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
                            emailStatus.className = 'input-status error';
                            emailHint.innerHTML = 'Email not found in our system';
                            submitBtn.disabled = true;
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        emailStatus.className = 'input-status';
                        emailHint.innerHTML = '';
                        submitBtn.disabled = false; // Allow submit anyway
                    });
            }, 500);
        }

        // Real-time validation as user types
        document.getElementById('emailid').addEventListener('input', function() {
            const emailInput = document.getElementById('emailid');
            const submitBtn = document.getElementById('submitBtn');
            
            if (emailInput.value.trim()) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(emailInput.value.trim())) {
                    validateEmail();
                } else {
                    submitBtn.disabled = true;
                    document.getElementById('emailStatus').innerHTML = '';
                    document.getElementById('emailHint').innerHTML = '';
                }
            } else {
                submitBtn.disabled = true;
            }
        });

        // Form submission handler
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailid').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!email) {
                alert('Please enter your email address');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';

            // Submit form
            this.submit();
        });
    </script>
</body>
</html>
